<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Besu Pro Explorer</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.0/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const provider = new ethers.JsonRpcProvider(window.location.origin + "/rpc");

        function App() {
            const [blockHeight, setBlockHeight] = useState(0);
            const [blocks, setBlocks] = useState([]);
            const [allBlocks, setAllBlocks] = useState([]);
            const [pendingTxs, setPendingTxs] = useState(0);
            const [searchQuery, setSearchQuery] = useState("");
            const [view, setView] = useState({ type: 'dashboard', data: null });
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                const init = async () => {
                    try {
                        const height = await provider.getBlockNumber();
                        setBlockHeight(height);
                        fetchBlocks(height);
                        fetchTxPool();
                    } catch (e) {
                        console.error("Connection error", e);
                    }
                };
                init();
                const interval = setInterval(init, 3000);
                return () => clearInterval(interval);
            }, []);

            const fetchBlocks = async (height) => {
                const lastBlocks = [];
                for (let i = 0; i < 6; i++) {
                    if (height - i < 0) break;
                    const b = await provider.getBlock(height - i);
                    lastBlocks.push(b);
                }
                setBlocks(lastBlocks);
            };

            const fetchAllBlocks = async () => {
                setLoading(true);
                setView({ type: 'blocks-list', data: [] });
                const height = await provider.getBlockNumber();
                const list = [];
                for (let i = 0; i < 20; i++) {
                    if (height - i < 0) break;
                    const b = await provider.getBlock(height - i);
                    list.push(b);
                }
                setAllBlocks(list);
                setLoading(false);
            };

            const fetchTxPool = async () => {
                try {
                    const pool = await provider.send("txpool_status", []);
                    setPendingTxs(parseInt(pool.pending, 16) || 0);
                } catch (e) { /* txpool api might not be enabled */ }
            };

            const handleSearch = async (e) => {
                e.preventDefault();
                setLoading(true);
                const query = searchQuery.trim();
                
                try {
                    if (query.startsWith("0x")) {
                        if (query.length === 66) {
                            const tx = await provider.getTransaction(query);
                            if (tx) setView({ type: 'tx', data: tx });
                            else alert("Transaction not found");
                        } else if (query.length === 42) {
                            const balance = await provider.getBalance(query);
                            setView({ type: 'address', data: { address: query, balance: ethers.formatEther(balance) } });
                        }
                    } else if (!isNaN(query) && query !== "") {
                        const block = await provider.getBlock(parseInt(query), true);
                        if (block) setView({ type: 'block', data: block });
                        else alert("Block not found");
                    }
                } catch (err) {
                    alert("Error: " + err.message);
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView({type: 'dashboard'})}>
                            <div className="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-900/50">
                                <i className="fas fa-cube text-xl"></i>
                            </div>
                            <h1 className="text-2xl font-bold tracking-tight">Besu <span className="text-blue-500">Pro</span></h1>
                        </div>
                        
                        <form onSubmit={handleSearch} className="relative w-full md:w-96">
                            <input 
                                type="text" 
                                placeholder="Search Block / Tx / Address" 
                                className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 pl-10 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                            <i className="fas fa-search absolute left-3 top-3 text-slate-500"></i>
                        </form>
                    </div>

                    <div className="max-w-6xl mx-auto">
                        {view.type === 'dashboard' && (
                            <Dashboard blocks={blocks} height={blockHeight} pending={pendingTxs} setView={setView} onViewAll={fetchAllBlocks} />
                        )}
                        {view.type === 'blocks-list' && (
                            <BlocksList blocks={allBlocks} loading={loading} setView={setView} />
                        )}
                        {(view.type === 'block' || view.type === 'tx' || view.type === 'address') && (
                            <DetailView view={view} setView={setView} loading={loading} />
                        )}
                    </div>
                </div>
            );
        }

        function Dashboard({ blocks, height, pending, setView, onViewAll }) {
            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="glass p-6 rounded-2xl shadow-xl">
                            <p className="text-slate-400 text-sm font-medium mb-1">CURRENT BLOCK</p>
                            <h3 className="text-3xl font-bold">#{height}</h3>
                        </div>
                        <div className="glass p-6 rounded-2xl shadow-xl">
                            <p className="text-slate-400 text-sm font-medium mb-1">PENDING TXS</p>
                            <h3 className="text-3xl font-bold text-amber-500">{pending}</h3>
                        </div>
                        <div className="glass p-6 rounded-2xl shadow-xl border-l-4 border-l-emerald-500">
                            <p className="text-slate-400 text-sm font-medium mb-1">NETWORK STATUS</p>
                            <h3 className="text-3xl font-bold text-emerald-500">Active</h3>
                        </div>
                    </div>

                    <div className="glass rounded-2xl overflow-hidden shadow-2xl">
                        <div className="px-6 py-4 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                            <h2 className="font-bold text-lg">Latest Blocks</h2>
                            <button onClick={onViewAll} className="text-blue-500 text-sm hover:underline">View All</button>
                        </div>
                        <BlocksTable blocks={blocks} setView={setView} />
                    </div>
                </div>
            );
        }

        function BlocksList({ blocks, loading, setView }) {
            if (loading && blocks.length === 0) return <div className="text-center py-20 text-xl animate-pulse">Loading Blocks...</div>;
            return (
                <div className="glass rounded-2xl overflow-hidden shadow-2xl">
                    <div className="px-6 py-4 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                        <h2 className="font-bold text-lg">All Recent Blocks</h2>
                        <button onClick={() => window.location.reload()} className="text-slate-400 hover:text-white"><i className="fas fa-sync"></i></button>
                    </div>
                    <BlocksTable blocks={blocks} setView={setView} />
                </div>
            );
        }

        function BlocksTable({ blocks, setView }) {
            return (
                <div className="overflow-x-auto">
                    <table className="w-full text-left">
                        <thead className="bg-slate-800/30 text-slate-400 text-xs uppercase">
                            <tr>
                                <th className="px-6 py-3">Block</th>
                                <th className="px-6 py-3">Hash</th>
                                <th className="px-6 py-3 text-right">Txs</th>
                                <th className="px-6 py-3 text-right">Time</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-700/50">
                            {blocks.map(b => (
                                <tr key={b.number} className="hover:bg-slate-700/30 transition-colors cursor-pointer" onClick={() => setView({type: 'block', data: b})}>
                                    <td className="px-6 py-4 font-bold text-blue-400">#{b.number}</td>
                                    <td className="px-6 py-4 font-mono text-sm text-slate-300">{b.hash.substring(0, 24)}...</td>
                                    <td className="px-6 py-4 text-right">
                                        <span className="bg-slate-700 px-2 py-1 rounded text-xs font-bold">{b.transactions.length}</span>
                                    </td>
                                    <td className="px-6 py-4 text-right text-slate-400 text-sm">{new Date(b.timestamp * 1000).toLocaleTimeString()}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        function DetailView({ view, setView, loading }) {
            if (loading) return <div className="text-center py-20 text-xl animate-pulse">Searching Blockchain...</div>;
            
            const { type, data } = view;

            return (
                <div className="glass rounded-2xl p-8 shadow-2xl relative">
                    <button 
                        onClick={() => setView({type: 'dashboard'})}
                        className="absolute top-6 right-8 text-slate-400 hover:text-white transition-colors"
                    >
                        <i className="fas fa-times text-xl"></i>
                    </button>

                    {type === 'block' && (
                        <div className="space-y-6">
                            <h2 className="text-2xl font-bold flex items-center gap-3">
                                <i className="fas fa-cube text-blue-500"></i> Block #{data.number}
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                <InfoItem label="Hash" value={data.hash} mono />
                                <InfoItem label="Parent Hash" value={data.parentHash} mono />
                                <InfoItem label="Timestamp" value={new Date(data.timestamp * 1000).toLocaleString()} />
                                <InfoItem label="Gas Used" value={data.gasUsed.toString()} />
                                <InfoItem label="Gas Limit" value={data.gasLimit.toString()} />
                                <InfoItem label="Extra Data" value={data.extraData} mono wrap />
                            </div>
                        </div>
                    )}

                    {type === 'tx' && (
                        <div className="space-y-6">
                            <h2 className="text-2xl font-bold flex items-center gap-3">
                                <i className="fas fa-exchange-alt text-amber-500"></i> Transaction
                            </h2>
                            <div className="grid grid-cols-1 gap-4 text-sm">
                                <InfoItem label="Transaction Hash" value={data.hash} mono />
                                <InfoItem label="From" value={data.from} mono />
                                <InfoItem label="To" value={data.to} mono />
                                <InfoItem label="Value" value={ethers.formatEther(data.value) + " ETH"} />
                                <InfoItem label="Block" value={"#" + data.blockNumber} />
                                <InfoItem label="Nonce" value={data.nonce.toString()} />
                            </div>
                        </div>
                    )}

                    {type === 'address' && (
                        <div className="space-y-6">
                            <h2 className="text-2xl font-bold flex items-center gap-3">
                                <i className="fas fa-wallet text-emerald-500"></i> Wallet Address
                            </h2>
                            <div className="grid grid-cols-1 gap-4 text-sm">
                                <InfoItem label="Address" value={data.address} mono />
                                <InfoItem label="Balance" value={data.balance + " ETH"} highlight />
                            </div>
                            <p className="text-slate-500 italic mt-4">Tip: Private keys are never shown in the explorer for security.</p>
                        </div>
                    )}
                </div>
            );
        }

        function InfoItem({ label, value, mono, wrap, highlight }) {
            return (
                <div className="p-4 bg-slate-800/50 rounded-xl border border-slate-700/50">
                    <p className="text-slate-400 text-xs font-bold uppercase mb-1">{label}</p>
                    <p className={`${mono ? 'font-mono text-blue-300' : 'font-medium'} ${wrap ? 'break-all' : 'truncate'} ${highlight ? 'text-2xl text-emerald-400' : ''}`}>
                        {value}
                    </p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
